send_command:
  name: Send command
  description: Send a command to a UNiNUS device.
  fields:
    host:
      name: Host
      description: Target device hostname.
      required: true
      example: "sensor01"
      selector:
        text:
    command:
      name: Command
      description: Command to execute.
      required: true
      example: "sh ver"
      selector:
        text:
    token:
      name: Token
      description: Device token (optional, uses stored if empty).
      required: false
      selector:
        text:
    confirm:
      name: Confirm dangerous command
      description: Bypass dangerous-command policy gate for this call.
      required: false
      selector:
        boolean:
    broker_host:
      name: Broker host
      description: MQTT broker hostname/IP (optional, uses backend config if empty).
      required: false
      selector:
        text:
    broker_port:
      name: Broker port
      description: MQTT broker port.
      required: false
      selector:
        number:
          min: 1
          max: 65535
    broker_user:
      name: Broker username
      description: MQTT broker username.
      required: false
      selector:
        text:
    broker_password:
      name: Broker password
      description: MQTT broker password.
      required: false
      selector:
        text:

approve_operation:
  name: Approve dangerous operation
  description: Grant a temporary approval window for a dangerous command on a target device.
  fields:
    host:
      name: Host
      description: Target device hostname.
      required: true
      selector:
        text:
    command:
      name: Command
      description: Exact command string that should be allowed temporarily.
      required: true
      selector:
        text:
    ttl_seconds:
      name: Approval window
      description: How many seconds the temporary approval remains valid.
      required: false
      default: 180
      selector:
        number:
          min: 30
          max: 3600
          unit_of_measurement: seconds
    note:
      name: Note
      description: Optional audit note for why this approval was granted.
      required: false
      selector:
        text:
request_token:
  name: Request token
  description: Request device token/serial number from a UNiNUS device.
  fields:
    host:
      name: Host
      description: Target device hostname.
      required: true
      selector:
        text:
    username:
      name: Username
      description: Login username.
      required: false
      selector:
        text:
    password:
      name: Password
      description: Login password.
      required: false
      selector:
        text:

    broker_host:
      name: Broker host
      description: MQTT broker hostname/IP (optional, uses backend config if empty).
      required: false
      selector:
        text:
    broker_port:
      name: Broker port
      description: MQTT broker port.
      required: false
      selector:
        number:
          min: 1
          max: 65535
    broker_user:
      name: Broker username
      description: MQTT broker username.
      required: false
      selector:
        text:
    broker_password:
      name: Broker password
      description: MQTT broker password.
      required: false
      selector:
        text:


batch_command:
  name: Batch command
  description: Execute commands across multiple devices sequentially.
  fields:
    hosts:
      name: Hosts
      description: List of target hostnames.
      required: true
      selector:
        object:
    commands:
      name: Commands
      description: List of commands to execute on each host.
      required: true
      selector:
        object:
    delay:
      name: Delay
      description: Delay in seconds between commands.
      required: false
      default: 1
      selector:
        number:
          min: 0
          max: 30
          unit_of_measurement: seconds
    confirm:
      name: Confirm dangerous commands
      description: Allow dangerous commands in this batch without a separate approval window.
      required: false
      selector:
        boolean:

    broker_host:
      name: Broker host
      description: MQTT broker hostname/IP (optional, uses backend config if empty).
      required: false
      selector:
        text:
    broker_port:
      name: Broker port
      description: MQTT broker port.
      required: false
      selector:
        number:
          min: 1
          max: 65535
    broker_user:
      name: Broker username
      description: MQTT broker username.
      required: false
      selector:
        text:
    broker_password:
      name: Broker password
      description: MQTT broker password.
      required: false
      selector:
        text:


mqtt_publish:
  name: MQTT publish
  description: Publish a test message to an MQTT topic.
  fields:
    topic:
      name: Topic
      description: MQTT topic to publish to.
      required: true
      selector:
        text:
    payload:
      name: Payload
      description: Message payload.
      required: true
      selector:
        text:

    broker_host:
      name: Broker host
      description: MQTT broker hostname/IP (optional, uses backend config if empty).
      required: false
      selector:
        text:
    broker_port:
      name: Broker port
      description: MQTT broker port.
      required: false
      selector:
        number:
          min: 1
          max: 65535
    broker_user:
      name: Broker username
      description: MQTT broker username.
      required: false
      selector:
        text:
    broker_password:
      name: Broker password
      description: MQTT broker password.
      required: false
      selector:
        text:


collect_neighbors:
  name: Collect UNiNUS neighbors
  description: Discover UNiNUS devices on the network via URCOM protocol.
  fields:
    broker_host:
      name: Broker host
      description: MQTT broker hostname/IP (optional, uses backend config if empty).
      required: false
      selector:
        text:
    broker_port:
      name: Broker port
      description: MQTT broker port.
      required: false
      selector:
        number:
          min: 1
          max: 65535
    broker_user:
      name: Broker username
      description: MQTT broker username.
      required: false
      selector:
        text:
    broker_password:
      name: Broker password
      description: MQTT broker password.
      required: false
      selector:
        text:
    domain:
      name: URCOM domain
      description: URCOM discovery domain.
      required: false
      selector:
        text:
    callback_ip:
      name: Callback IP
      description: IP address for device to respond to.
      required: false
      selector:
        text:

run_health_check:
  name: Run health check
  description: Request token and run a lightweight version/clock/result check across selected devices.
  fields:
    hosts:
      name: Hosts
      description: Optional list of hostnames. If omitted, checks all configured hosts.
      required: false
      selector:
        object:
    delay:
      name: Delay
      description: Delay in seconds between health-check commands.
      required: false
      default: 1
      selector:
        number:
          min: 0
          max: 30
          step: 0.5
          unit_of_measurement: seconds

sync_backup_status:
  name: Sync backup status
  description: Read latest backup metadata files from the HA host and import them into unircon runtime state.
  fields:
    hosts:
      name: Hosts
      description: Optional list of hostnames. If omitted, syncs all configured hosts.
      required: false
      selector:
        object:
    metadata_root:
      name: Metadata root
      description: Optional absolute path or config-relative path to the worker metadata directory.
      required: false
      selector:
        text:
    clear_missing:
      name: Clear missing hosts
      description: Clear cached backup fields for hosts that have no matching metadata file.
      required: false
      default: false
      selector:
        boolean:

export_inventory:
  name: Export inventory
  description: Emit the current host inventory and runtime summary as an event.
  fields:
    hosts:
      name: Hosts
      description: Optional list of hostnames. If omitted, exports all configured hosts.
      required: false
      selector:
        object:

export_binding_candidates:
  name: Export binding candidates
  description: Inspect HA device and entity registry and emit suggested binding-map candidates.
  fields:
    hosts:
      name: Hosts
      description: Optional list of hostnames. If omitted, inspects all configured hosts.
      required: false
      selector:
        object:

generate_binding_map:
  name: Generate binding map
  description: Build binding-map JSON text from current HA registry matches and emit it as an event.
  fields:
    hosts:
      name: Hosts
      description: Optional list of hostnames. If omitted, inspects all configured hosts.
      required: false
      selector:
        object:

save_binding_map:
  name: Save binding map
  description: Build binding-map JSON text and save it to a file on the HA host.
  fields:
    hosts:
      name: Hosts
      description: Optional list of hostnames. If omitted, inspects all configured hosts.
      required: false
      selector:
        object:
    path:
      name: Output path
      description: Optional absolute path or config-relative path. Default is config/unircon/binding-map.generated.json.
      required: false
      selector:
        text:
    overwrite:
      name: Overwrite existing file
      description: Allow replacing an existing binding-map file.
      required: false
      default: false
      selector:
        boolean:

