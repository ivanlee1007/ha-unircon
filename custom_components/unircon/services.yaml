send_command:
  name: Send command
  description: Send a command to a UNiNUS device.
  fields:
    host:
      name: Host
      description: Target device hostname.
      required: true
      example: "sensor01"
      selector:
        text:
    command:
      name: Command
      description: Command to execute.
      required: true
      example: "sh ver"
      selector:
        text:
    token:
      name: Token
      description: Device token (optional, uses stored if empty).
      required: false
      selector:
        text:

request_token:
  name: Request token
  description: Request device token/serial number from a UNiNUS device.
  fields:
    host:
      name: Host
      description: Target device hostname.
      required: true
      selector:
        text:
    username:
      name: Username
      description: Login username.
      required: false
      selector:
        text:
    password:
      name: Password
      description: Login password.
      required: false
      selector:
        text:

batch_command:
  name: Batch command
  description: Execute commands across multiple devices sequentially.
  fields:
    hosts:
      name: Hosts
      description: List of target hostnames.
      required: true
      selector:
        object:
    commands:
      name: Commands
      description: List of commands to execute on each host.
      required: true
      selector:
        object:
    delay:
      name: Delay
      description: Delay in seconds between commands.
      required: false
      default: 1
      selector:
        number:
          min: 0
          max: 30
          unit_of_measurement: seconds

mqtt_publish:
  name: MQTT publish
  description: Publish a test message to an MQTT topic.
  fields:
    topic:
      name: Topic
      description: MQTT topic to publish to.
      required: true
      selector:
        text:
    payload:
      name: Payload
      description: Message payload.
      required: true
      selector:
        text:

collect_neighbors:
  name: Collect UNiNUS neighbors
  description: Discover UNiNUS devices on the network via URCOM protocol.
  fields:
    broker_host:
      name: Broker host
      description: MQTT broker hostname/IP (optional, uses backend config if empty).
      required: false
      selector:
        text:
    broker_port:
      name: Broker port
      description: MQTT broker port.
      required: false
      selector:
        number:
          min: 1
          max: 65535
    broker_user:
      name: Broker username
      description: MQTT broker username.
      required: false
      selector:
        text:
    broker_password:
      name: Broker password
      description: MQTT broker password.
      required: false
      selector:
        text:
    domain:
      name: URCOM domain
      description: URCOM discovery domain.
      required: false
      selector:
        text:
    callback_ip:
      name: Callback IP
      description: IP address for device to respond to.
      required: false
      selector:
        text:

generate_deploy:
  name: Generate deploy config
  description: Generate device deployment configuration text.
  fields:
    backup_protocol:
      name: Backup protocol
      description: Backup protocol (ftp/http/tftp).
      selector:
        text:
    backup_server:
      name: Backup server
      description: Backup server address.
      selector:
        text:
    backup_file:
      name: Backup file
      description: Backup file path pattern.
      selector:
        text:
    update_protocol:
      name: Update protocol
      description: Update protocol (mqtt/http/tcp).
      selector:
        text:
    update_server:
      name: Update server
      description: Update server address.
      selector:
        text:
    update_port:
      name: Update port
      description: Update server port.
      selector:
        text:
    update_user:
      name: Update user
      description: Update server username.
      selector:
        text:
    update_password:
      name: Update password
      description: Update server password.
      selector:
        text:
    update_subscribe:
      name: Subscribe topic
      description: Subscribe topic pattern.
      selector:
        text:
    update_publish:
      name: Publish topic
      description: Publish topic pattern.
      selector:
        text:
    update_publish_response:
      name: Publish response topic
      description: Publish response topic pattern.
      selector:
        text:
    update_publish_log:
      name: Publish log topic
      description: Publish log topic pattern.
      selector:
        text:
    sta_ssid:
      name: WiFi SSID
      description: WiFi network name.
      selector:
        text:
    sta_password:
      name: WiFi password
      description: WiFi password.
      selector:
        text:
    ntp_server:
      name: NTP server
      description: NTP server address.
      selector:
        text:
    ntp_timezone:
      name: NTP timezone
      description: NTP timezone offset.
      selector:
        text:

add_device:
  name: Add device
  description: Add a new device to the integration (from neighbor discovery or manual).
  fields:
    host:
      name: Host
      description: Device hostname to add.
      required: true
      selector:
        text:
